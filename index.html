<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotoğraf & Video Yükle</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to bottom, #fdfaf6, #fff1e6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    font-family: 'Playfair Display', serif;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #e8d8c3;
    border-radius: 20px;
    cursor: pointer;
}

.progress-container {
    margin-top: 20px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: #e8d8c3;
    transition: width 0.3s;
}

.status {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container" id="container">

    <h2>Anılarınızı Paylaşın 💕</h2>

    <div id="formArea">
        <input type="text" id="nameInput" placeholder="İsminiz (opsiyonel)">
        <input type="file" id="fileInput" multiple accept="image/*,video/*">
        <button onclick="upload()">Yükle</button>
    </div>

    <div class="progress-container" id="progressContainer" style="display:none;">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status"></div>

</div>

<script>
let cachedToken = null;

// 🔑 token al
async function getAccessToken() {
    if (cachedToken) return cachedToken;

    const res = await fetch("https://backend-clean-six.vercel.app/api/token");
    const data = await res.json();

    cachedToken = data.access_token;
    return cachedToken;
}

// 🚀 upload
async function upload() {
    const files = document.getElementById("fileInput").files;
    const name = document.getElementById("nameInput").value || "misafir";

    if (!files.length) {
        alert("Dosya seç!");
        return;
    }

    const formArea = document.getElementById("formArea");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");
    const status = document.getElementById("status");

    // 🎯 formu gizle
    formArea.style.display = "none";
    progressContainer.style.display = "block";

    const ACCESS_TOKEN = await getAccessToken();

    for (let i = 0; i < files.length; i++) {
        const file = files[i];

        status.innerText = `Yükleniyor ${i+1}/${files.length}`;

        let folder = "images";
        if (file.type.startsWith("video/")) {
            folder = "videos";
        }

        const path = `/${folder}/${name}/${Date.now()}-${file.name}`;

        await uploadFile(file, path, ACCESS_TOKEN);

        const percent = Math.round(((i + 1) / files.length) * 100);
        progressBar.style.width = percent + "%";
    }

    // 🎉 bitiş ekranı
    document.getElementById("container").innerHTML = `
        <h2>Teşekkürler 💕</h2>
        <p>Tüm anılar başarıyla yüklendi 🎉</p>
    `;
}

// 📤 upload
function uploadFile(file, path, token) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();

        xhr.open("POST", "https://content.dropboxapi.com/2/files/upload");

        xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.setRequestHeader("Dropbox-API-Arg", JSON.stringify({
            path: path,
            mode: "add",
            autorename: true
        }));
        xhr.setRequestHeader("Content-Type", "application/octet-stream");

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById("progressBar").style.width = percent + "%";
            }
        };

        xhr.onload = () => {
            if (xhr.status === 200) {
                resolve();
            } else {
                console.log(xhr.responseText);
                reject();
            }
        };

        xhr.onerror = () => reject();

        xhr.send(file);
    });
}
</script>

</body>
</html>
