<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotoğraf Yükle</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to bottom, #fdfaf6, #fff1e6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Kart */
.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Başlık */
h2 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 10px;
}

/* Inputlar */
input[type="file"],
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #ddd;
}

/* Buton */
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #e8d8c3;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #f7e6d0;
}

/* Progress bar */
.progress-container {
    margin-top: 15px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: #e8d8c3;
    transition: width 0.3s;
}

.status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Anılarınızı Paylaşın 💕</h2>
    <p>Çektiğiniz fotoğrafları bizimle paylaşabilirsiniz</p>

    <input type="text" id="nameInput" placeholder="İsminiz (opsiyonel)">
    <input type="file" id="fileInput">

    <button onclick="upload()">Yükle</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
async function upload() {
  const fileInput = document.getElementById("fileInput");
  const nameInput = document.getElementById("nameInput");

  const files = fileInput.files;
  const name = nameInput.value;

  if (!files.length) {
    alert("Dosya seç!");
    return;
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];

    const base64 = await toBase64(file);

    await fetch("https://backend-clean-six.vercel.app/api/upload", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        file: base64.split(",")[1],
        name: name
      })
    });
  }

  alert("Tüm fotoğraflar yüklendi 🎉");
}

// yardımcı fonksiyon
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
